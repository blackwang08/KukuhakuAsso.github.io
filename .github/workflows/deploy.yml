name: Deploy CVM and Redirect Git Pages

on:
  push:
    branches:
      - main # 如果是 master 请修改

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
