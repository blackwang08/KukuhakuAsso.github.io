name: Deploy CVM and Redirect Git Pages

on:
  push:
    branches:
      - main # 如果是 master 请修改

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ==========================================
  # 任务 1：编译真实业务，并通过 SSH 部署到 CVM
  # ==========================================
  deploy_to_cvm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Install Telemetry dependencies
        run: |
          cd vue-TelemetryInstruments
          npm install

      - name: Build all projects
        run: npm run build

      - name: Deploy to Tencent CVM via SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-avzr --delete"
          SOURCE: "dist-preview/" # 🎯 把编译好的总目录传给服务器
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: root
          TARGET: "/www/wwwroot/你的网站目录" # ⚠️ 替换为宝塔面板里的网站根目录

  # ==========================================
  # 任务 2：生成静态跳转页，并部署到 GitHub Pages
  # ==========================================
  deploy_redirect_to_pages:
    runs-on: ubuntu-latest
    needs: deploy_to_cvm # 确保 CVM 部署成功后，再更新跳转页
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Create Redirect HTML
        run: |
          mkdir redirect-page
          # 动态生成一个包含重定向逻辑的 index.html
          cat << 'EOF' > redirect-page/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="0; url=https://www.ku2hakuasso.site/">
              <title>正在跳转到新站点...</title>
              <script>

                // 1. 从旧域名的 localStorage 中读取你需要迁移的字段
                const gameToken = localStorage.getItem('game_token');
                const gameCompleted = localStorage.getItem('game_completed');

                // 2. 将数据打包并编码，防止特殊字符破坏 URL
                const transferData = encodeURIComponent(JSON.stringify({
                  gameToken: gameToken,
                  gameCompleted: gameCompleted
                }));

                // 3. 构建新的 URL，带上搬运的数据（通过一个叫 _migrate 的特殊参数传递）
                const targetDomain = "https://www.ku2hakuasso.site/";
                const newUrl = `${targetDomain}${window.location.pathname}?_migrate=${transferData}&${window.location.search.substring(1)}${window.location.hash}`;

                // 4. 执行跳转
                window.location.replace(newUrl);
              </script>
            </head>
            <body style="background-color: #f5f5f5; text-align: center; font-family: sans-serif; padding-top: 50px;">
              <p>系统已迁移至全新服务器，正在为您跳转...</p>
              <p>如果没有自动跳转，请 <a href="https://www.ku2hakuasso.site/">点击这里</a>。</p>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: redirect-page # 🎯 核心：只把这个包含跳转代码的文件夹给 GitHub Pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
