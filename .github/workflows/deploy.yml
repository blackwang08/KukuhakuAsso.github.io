  # ==========================================
  # 任务 2：生成静态跳转页，并部署到 GitHub Pages
  # ==========================================
 deploy_redirect_to_pages:
    runs-on: ubuntu-latest
    # needs: deploy_to_cvm
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Create Redirect and 404 HTML
        run: |
          mkdir redirect-page
          # 编写包含 localStorage 搬运逻辑的通用跳转代码
          cat << 'EOF' > redirect-page/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="UTF-8">
              <title>正在同步数据并跳转...</title>
              <script>
                (function() {
                  var targetDomain = "https://www.ku2hakuasso.site/"; 
                  
                  var localData = {};
                  for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    localData[key] = localStorage.getItem(key);
                  }
                  
                  // 3. 将数据转为 Base64 (防止特殊字符破坏 URL)
                  // 注意：如果数据特别大，可以用 btoa(encodeURIComponent(JSON.stringify(localData)))
                  var migratePayload = "";
                  if (Object.keys(localData).length > 0) {
                    migratePayload = encodeURIComponent(JSON.stringify(localData));
                  }

                  // 4. 获取当前的路径、查询参数和哈希值 (完美兼容 Vitepress 和 Vue Hash 路由)
                  var path = window.location.pathname;
                  var search = window.location.search;
                  var hash = window.location.hash;

                  // 5. 拼接最终跳转的 URL
                  // 如果原 URL 没有参数，我们加个 ?; 如果有参数，我们加个 &
                  var separator = search ? "&" : "?";
                  var finalUrl = targetDomain + path + search;
                  
                  // 将 localStorage 数据塞进 _migrate 参数中
                  if (migratePayload) {
                    finalUrl += separator + "_migrate=" + migratePayload;
                  }
                  
                  // Hash 必须放在整个 URL 的最后面
                  finalUrl += hash;

                  // 6. 立即跳转
                  window.location.replace(finalUrl);
                })();
              </script>
            </head>
            <body style="text-align: center; padding-top: 50px; font-family: sans-serif;">
              <p>系统已升级，正在同步您的本地数据并跳转至新站点...</p>
            </body>
          </html>
          EOF
          
          # 🎯 核心：将 index.html 复制一份重命名为 404.html，这样 GitHub Pages 就会自动处理 404 请求
          cp redirect-page/index.html redirect-page/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: redirect-page

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
